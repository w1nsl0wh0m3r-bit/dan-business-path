// ===== MAP =====
const STATUS_PREFIX = {
  verified_open: '',
  opening_announced: '◯ ',
  unclear: '? ',
  closed: '✕ ',
  pop_up_or_cart: '▣ '
};

const map = L.map('candy-map', { scrollWheelZoom: false }).setView([39.5, -98.35], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

let markers = [];
let radiusCircles = [];
let allRadiiLayer = L.layerGroup().addTo(map);

function createPopup(s) {
  let urls = (s.evidence_urls || '').split(';').filter(u => u.trim());
  let links = urls.map(u => '<a href="' + u.trim() + '" target="_blank">Source</a>').join('');
  return '<div class="popup-brand">' + (STATUS_PREFIX[s.status]||'') + s.brand + '</div>' +
    '<div class="popup-addr">' + s.address + ', ' + s.city + ', ' + s.state + ' ' + s.zip + '</div>' +
    '<div class="popup-meta">' +
    '<b>Status:</b> ' + (s.status||'').replace(/_/g,' ') + '<br>' +
    '<b>Channel:</b> ' + (s.channel||'').replace(/_/g,' ') + '<br>' +
    '<b>Cluster:</b> ' + (s.market_cluster||'') + '<br>' +
    (s.notes ? '<b>Notes:</b> ' + s.notes + '<br>' : '') +
    '</div>' +
    (links ? '<div class="popup-links">' + links + '</div>' : '');
}

function drawRadii(lat, lng, layerGroup) {
  const radii = [
    { m: 1609, color: '#b78b38' },
    { m: 4828, color: '#315e72' },
    { m: 8047, color: '#6f8062' },
    { m: 16093, color: '#b86f4d' }
  ];
  radii.forEach(r => {
    L.circle([lat, lng], {
      radius: r.m, color: r.color, weight: 1.5, opacity: 0.5,
      fillColor: r.color, fillOpacity: 0.03
    }).addTo(layerGroup);
  });
}

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  radiusCircles.forEach(c => map.removeLayer(c));
  radiusCircles = [];
  allRadiiLayer.clearLayers();

  const bf = document.getElementById('filter-brand').value;
  const cf = document.getElementById('filter-cluster').value;
  const q = document.getElementById('search-box').value.toLowerCase();
  const so = document.getElementById('show-open').checked;
  const sa = document.getElementById('show-announced').checked;
  const sc = document.getElementById('show-closed').checked;
  const se = document.getElementById('show-excluded').checked;
  const sar = document.getElementById('show-all-radii').checked;

  STORES.forEach(s => {
    if (s.status === 'verified_open' && !so) return;
    if (s.status === 'opening_announced' && !sa) return;
    if (s.status === 'unclear' && !sa) return;
    if (s.status === 'closed' && !sc) return;
    if (s.status === 'pop_up_or_cart' && !se) return;
    if (s.dan_posture === 'exclude' && !se) return;
    if (bf && s.brand !== bf) return;
    if (cf && s.market_cluster !== cf) return;
    if (q) {
      const h = (s.brand + ' ' + s.city + ' ' + s.state + ' ' + s.location_name).toLowerCase();
      if (!h.includes(q)) return;
    }
    if (!s.latitude || !s.longitude) return;

    const color = BRAND_COLORS[s.brand] || '#766b5e';
    const prefix = STATUS_PREFIX[s.status] || '';
    const marker = L.circleMarker([s.latitude, s.longitude], {
      radius: 8, fillColor: color, color: '#fff', weight: 1.5, opacity: 0.8, fillOpacity: 0.85
    });
    marker.bindPopup(createPopup(s));
    marker.on('click', function() {
      radiusCircles.forEach(c => map.removeLayer(c));
      radiusCircles = [];
      let g = L.layerGroup().addTo(map);
      drawRadii(s.latitude, s.longitude, g);
      radiusCircles.push(g);
    });
    marker.addTo(map);
    markers.push(marker);
    if (sar) drawRadii(s.latitude, s.longitude, allRadiiLayer);
  });
}

function populateDropdowns() {
  const brands = [...new Set(STORES.map(s => s.brand))].sort();
  const clusters = [...new Set(STORES.map(s => s.market_cluster).filter(c => c))].sort();
  const bs = document.getElementById('filter-brand');
  brands.forEach(b => bs.innerHTML += '<option value="' + b + '">' + b + '</option>');
  const cs = document.getElementById('filter-cluster');
  clusters.forEach(c => cs.innerHTML += '<option value="' + c + '">' + c + '</option>');
}

// Map events
['filter-brand','filter-cluster','search-box','show-open','show-announced','show-closed','show-excluded','show-all-radii'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderMarkers);
  document.getElementById(id).addEventListener('change', renderMarkers);
});
document.getElementById('reset-bounds').addEventListener('click', () => map.setView([39.5, -98.35], 4));

populateDropdowns();
renderMarkers();

// ===== TABLE =====
const esc = (v) => String(v ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function linkButtons(links) {
  return '<div class="external-links">' +
    (links.website ? '<a href="' + esc(links.website) + '" target="_blank" rel="noopener">Site</a>' : '') +
    (links.maps ? '<a href="' + esc(links.maps) + '" target="_blank" rel="noopener">Map</a>' : '') +
    (links.instagram ? '<a href="' + esc(links.instagram) + '" target="_blank" rel="noopener">IG</a>' : '') +
    '</div>';
}

function brandCell(brand) {
  const color = BRAND_COLORS[brand] || '#766b5e';
  return '<span class="brand-cell"><span class="brand-dot" style="background:' + color + '"></span>' + esc(brand) + '</span>';
}

function statusPill(v) {
  const s = v.toLowerCase();
  let cls = 'open';
  if (s.includes('closed')) cls = 'closed';
  else if (s.includes('announced') || s.includes('unclear')) cls = 'announced';
  else if (s.includes('pop') || s.includes('cart') || s.includes('ecommerce')) cls = 'exclude';
  return '<span class="pill ' + cls + '">' + esc(v) + '</span>';
}

const tableClusterSel = document.getElementById('table-cluster');
[...new Set(TABLE_ROWS.map(r => r.cluster).filter(c => c))].sort().forEach(c => {
  tableClusterSel.innerHTML += '<option>' + esc(c) + '</option>';
});

function renderTable() {
  const q = document.getElementById('table-search').value.toLowerCase();
  const cf = document.getElementById('table-cluster').value;
  const body = document.getElementById('store-table-body');
  const rows = TABLE_ROWS.filter(r => {
    if (q) {
      const h = (r.brand + ' ' + r.location + ' ' + r.address + ' ' + r.cluster + ' ' + r.notes).toLowerCase();
      if (!h.includes(q)) return false;
    }
    if (cf && r.cluster !== cf) return false;
    return true;
  });
  body.innerHTML = rows.map(r => '<tr>' +
    '<td>' + r.rank + '</td>' +
    '<td>' + brandCell(r.brand) + '</td>' +
    '<td>' + linkButtons(r.links) + '</td>' +
    '<td>' + esc(r.location) + '</td>' +
    '<td>' + esc(r.address) + '</td>' +
    '<td>' + statusPill(r.status) + '</td>' +
    '<td>' + esc(r.channel) + '</td>' +
    '<td>' + esc(r.cluster) + '</td>' +
    '<td>' + esc(r.notes) + '</td>' +
    '</tr>').join('');
}

['table-search','table-cluster'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderTable);
  document.getElementById(id).addEventListener('change', renderTable);
});

renderTable();
</script>
</body>
</html>
